<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="TrendSight 夜间图标">
  <defs>
    <linearGradient id="tile" x1="148" y1="104" x2="872" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#242426"/>
      <stop offset="1" stop-color="#111b2a"/>
    </linearGradient>
    <linearGradient id="teal" x1="222" y1="480" x2="334" y2="672" gradientUnits="userSpaceOnUse">
      <stop stop-color="#55e6a5"/>
      <stop offset="1" stop-color="#20b977"/>
    </linearGradient>
    <linearGradient id="blue" x1="414" y1="360" x2="536" y2="585" gradientUnits="userSpaceOnUse">
      <stop stop-color="#72d7ff"/>
      <stop offset="1" stop-color="#2997ff"/>
    </linearGradient>
    <linearGradient id="amber" x1="592" y1="255" x2="722" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffd86a"/>
      <stop offset="1" stop-color="#ff9f0a"/>
    </linearGradient>
    <filter id="tile-shadow" x="-12%" y="-12%" width="124%" height="128%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000000" flood-opacity=".34"/>
    </filter>
    <filter id="mark-shadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="10" stdDeviation="13" flood-color="#000000" flood-opacity=".38"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="#0b0b0c"/>
  <rect x="48" y="42" width="928" height="928" rx="222" fill="url(#tile)" stroke="#34445a" stroke-width="8" filter="url(#tile-shadow)"/>

  <g filter="url(#mark-shadow)">
    <path d="M278 408V720" stroke="#20b977" stroke-width="22" stroke-linecap="round"/>
    <rect x="222" y="480" width="112" height="192" rx="24" fill="url(#teal)" stroke="#202a38" stroke-width="8"/>

    <path d="M475 288V650" stroke="#2997ff" stroke-width="22" stroke-linecap="round"/>
    <rect x="414" y="360" width="122" height="225" rx="26" fill="url(#blue)" stroke="#202a38" stroke-width="8"/>

    <path d="M657 180V565" stroke="#ff9f0a" stroke-width="22" stroke-linecap="round"/>
    <rect x="592" y="255" width="130" height="245" rx="28" fill="url(#amber)" stroke="#202a38" stroke-width="8"/>

    <path d="M232 780L430 582L558 677L804 392" fill="none" stroke="#2997ff" stroke-width="70" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M742 344L880 305L850 443L806 397Z" fill="#2997ff" stroke="#d7e9ff" stroke-width="8" stroke-linejoin="round"/>
  </g>
</svg>
