name: Bug 报告
description: 报告可以稳定复现的功能问题
title: "[Bug]: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: 感谢反馈。请勿在 Issue 中粘贴密钥、Cookie、个人数据或未脱敏的交易数据。
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 实际发生了什么？你原本期待什么？
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 启动……
        2. 输入……
        3. 看到……
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 影响范围
      options:
        - Web 工作台
        - stock-ticks 命令
        - stock-news 命令
        - 构建或文档
        - 不确定
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 运行环境
      description: 操作系统、Go/Node.js 版本和浏览器版本（如适用）
      placeholder: macOS 15, Go 1.25, Node.js 22, Chrome 140
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 请先移除股票持仓、账号、路径、令牌等敏感信息。
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，未发现相同问题。
          required: true
        - label: 该问题不是数据源短暂限流或停机造成的单次失败。
          required: true
