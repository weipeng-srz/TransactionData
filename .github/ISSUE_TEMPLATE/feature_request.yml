name: 功能建议
description: 提议一个明确、可验证的改进
title: "[Feature]: "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 请描述使用场景和当前阻碍，而不只是期望的实现方式。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 说明预期行为、输入输出和边界情况。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
  - type: checkboxes
    id: scope
    attributes:
      label: 范围确认
      options:
        - label: 该建议用于研究或工程能力，不要求项目给出投资结论、收益承诺或规避数据访问规则。
          required: true
